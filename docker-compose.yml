services:
  api:
    build: .
    container_name: rag-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    entrypoint: ["sh", "entrypoint.sh"]
    environment:
      - PORT=3000
      - OLLAMA_URL=http://host.docker.internal:11434
      - QDRANT_URL=http://qdrant:6333
      - RERANKER_URL=http://reranker:80
      - DOCS_PATH=/docs
      - DATABASE_URL=postgresql://rag_user:rag_password@postgres:5432/rag_db
      - NODE_ENV=development
    volumes:
      - ./docs:/docs:ro
      - ./src:/app/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      reranker:
        condition: service_healthy

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    container_name: reranker
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      - HF_ENDPOINT=https://huggingface.co
    volumes:
      - ./reranker_cache:/data
    command: --model-id BAAI/bge-reranker-base --port 80
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_password
      - POSTGRES_DB=rag_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user"]
      interval: 5s
      timeout: 5s
      retries: 5
